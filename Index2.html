<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Calculadora Profissional</title>

        <style>

            *{
                  margin:0;
                        padding:0;
                              box-sizing:border-box;
                                    font-family:Arial, Helvetica, sans-serif;
                                        }

                                            body{
                                                  height:100vh;
                                                        display:flex;
                                                              justify-content:center;
                                                                    align-items:center;
                                                                          background:linear-gradient(135deg,#141e30,#243b55);
                                                                              }

                                                                                  .calculadora{
                                                                                        width:320px;
                                                                                              background:#1f2937;
                                                                                                    padding:20px;
                                                                                                          border-radius:20px;
                                                                                                                box-shadow:0 10px 30px rgba(0,0,0,0.4);
                                                                                                                    }

                                                                                                                        #display{
                                                                                                                              height:80px;
                                                                                                                                    background:#111827;
                                                                                                                                          color:white;
                                                                                                                                                font-size:2rem;
                                                                                                                                                      display:flex;
                                                                                                                                                            align-items:center;
                                                                                                                                                                  justify-content:flex-end;
                                                                                                                                                                        padding:20px;
                                                                                                                                                                              border-radius:12px;
                                                                                                                                                                                    margin-bottom:20px;
                                                                                                                                                                                          overflow:hidden;
                                                                                                                                                                                              }

                                                                                                                                                                                                  .botoes{
                                                                                                                                                                                                        display:grid;
                                                                                                                                                                                                              grid-template-columns:repeat(4,1fr);
                                                                                                                                                                                                                    gap:10px;
                                                                                                                                                                                                                        }

                                                                                                                                                                                                                            button{
                                                                                                                                                                                                                                  height:60px;
                                                                                                                                                                                                                                        border:none;
                                                                                                                                                                                                                                              border-radius:12px;
                                                                                                                                                                                                                                                    font-size:1.2rem;
                                                                                                                                                                                                                                                          cursor:pointer;
                                                                                                                                                                                                                                                                transition:0.2s;
                                                                                                                                                                                                                                                                      background:#374151;
                                                                                                                                                                                                                                                                            color:white;
                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                    button:hover{
                                                                                                                                                                                                                                                                                          transform:scale(1.05);
                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                  .limpar{
                                                                                                                                                                                                                                                                                                        background:#ef4444;
                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                .igual{
                                                                                                                                                                                                                                                                                                                      background:#10b981;
                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                              .zero{
                                                                                                                                                                                                                                                                                                                                    grid-column:span 2;
                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                          </style>
                                                                                                                                                                                                                                                                                                                                          </head>

                                                                                                                                                                                                                                                                                                                                          <body>

                                                                                                                                                                                                                                                                                                                                            <div class="calculadora">

                                                                                                                                                                                                                                                                                                                                                <div id="display">0</div>

                                                                                                                                                                                                                                                                                                                                                    <div class="botoes">

                                                                                                                                                                                                                                                                                                                                                          <button onclick="limpar()" class="limpar">C</button>
                                                                                                                                                                                                                                                                                                                                                                <button onclick="apagar()">←</button>
                                                                                                                                                                                                                                                                                                                                                                      <button onclick="adicionar('/')">÷</button>
                                                                                                                                                                                                                                                                                                                                                                            <button onclick="adicionar('*')">×</button>

                                                                                                                                                                                                                                                                                                                                                                                  <button onclick="adicionar('7')">7</button>
                                                                                                                                                                                                                                                                                                                                                                                        <button onclick="adicionar('8')">8</button>
                                                                                                                                                                                                                                                                                                                                                                                              <button onclick="adicionar('9')">9</button>
                                                                                                                                                                                                                                                                                                                                                                                                    <button onclick="adicionar('-')">−</button>

                                                                                                                                                                                                                                                                                                                                                                                                          <button onclick="adicionar('4')">4</button>
                                                                                                                                                                                                                                                                                                                                                                                                                <button onclick="adicionar('5')">5</button>
                                                                                                                                                                                                                                                                                                                                                                                                                      <button onclick="adicionar('6')">6</button>
                                                                                                                                                                                                                                                                                                                                                                                                                            <button onclick="adicionar('+')">+</button>

                                                                                                                                                                                                                                                                                                                                                                                                                                  <button onclick="adicionar('1')">1</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                        <button onclick="adicionar('2')">2</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                              <button onclick="adicionar('3')">3</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                    <button onclick="calcular()" class="igual">=</button>

                                                                                                                                                                                                                                                                                                                                                                                                                                                          <button onclick="adicionar('0')" class="zero">0</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button onclick="adicionar('.')">.</button>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <script>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const display = document.getElementById("display");

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                let expressao = "";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function atualizarTela(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          display.innerText = expressao || "0";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  function adicionar(valor){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        expressao += valor;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              atualizarTela();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      function limpar(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            expressao = "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  atualizarTela();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          function apagar(){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                expressao = expressao.slice(0, -1);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      atualizarTela();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              function calcular(){

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    try{

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            expressao = eval(expressao).toString();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    atualizarTela();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }catch{

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  display.innerText = "Erro";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          expressao = "";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // SUPORTE AO TECLADO

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.addEventListener("keydown", (event)=>{

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const tecla = event.key;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if(
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                !isNaN(tecla) ||
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ["+", "-", "*", "/", "."].includes(tecla)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              ){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      adicionar(tecla);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if(tecla === "Enter"){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          calcular();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if(tecla === "Backspace"){
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              apagar();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </script>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </html>
